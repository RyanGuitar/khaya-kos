<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Page Not Found | Khaya Kos</title>
  <meta name="robots" content="noindex">

  <link rel="icon" type="image/svg+xml" href="/images/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&amp;family=Nunito:wght@400;600;700;800&amp;display=swap">
  <link rel="stylesheet" href="/styles.css?v=3.19">

  <style>
    .notfound-hero {
      min-height: 100vh;
      min-height: 100svh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding:
        max(24px, env(safe-area-inset-top))
        max(14px, env(safe-area-inset-right))
        max(24px, env(safe-area-inset-bottom))
        max(14px, env(safe-area-inset-left));
      background:
        radial-gradient(circle at 14% 16%, rgba(255, 212, 71, 0.5), transparent 32%),
        radial-gradient(circle at 88% 82%, rgba(0, 118, 110, 0.18), transparent 34%),
        var(--surface-soft);
    }

    .notfound-sign {
      width: min(100%, 520px);
      background: var(--paper);
      border-radius: clamp(22px, 6vw, 30px);
      padding: clamp(32px, 9vw, 52px) clamp(20px, 8vw, 42px);
      box-shadow: var(--shadow-lg);
      border: 2px solid var(--line);
      text-align: center;
    }

    .notfound-logo {
      width: clamp(62px, 18vw, 82px);
      margin: 0 auto 20px;
    }

    .notfound-code {
      font-family: 'Baloo 2', sans-serif;
      font-weight: 800;
      font-size: clamp(4rem, 22vw, 6rem);
      color: var(--red-deep);
      line-height: 1;
      text-shadow: 2px 2px 0 rgba(217, 154, 43, 0.35);
    }

    .notfound-title {
      font-family: 'Baloo 2', sans-serif;
      font-weight: 700;
      font-size: clamp(1.55rem, 8vw, 2.2rem);
      color: var(--ink);
      margin: 12px 0 10px;
      line-height: 1.12;
      text-wrap: balance;
    }

    .notfound-text {
      font-family: 'Nunito', sans-serif;
      color: var(--ink-soft);
      line-height: 1.6;
      margin-bottom: 26px;
      font-size: clamp(1rem, 4vw, 1.08rem);
      text-wrap: pretty;
    }

    .notfound-button {
      width: 100%;
      min-height: 54px;
      justify-content: center;
      text-align: center;
    }

    @media screen and (min-width: 600px) {
      .notfound-button {
        width: auto;
        min-width: 260px;
      }
    }
  </style>
</head>

<body>

  <main class="notfound-hero">
    <div class="notfound-sign">
      <img class="notfound-logo" src="/images/favicon.svg" alt="" width="82" height="82">
      <div class="notfound-code">404</div>
      <h1 class="notfound-title">This stall isn't here on a Saturday</h1>
      <p class="notfound-text">
        The page you're looking for doesn't exist — but the muffins do.
        Head back to find the full Khaya Kos menu.
      </p>
      <a href="/" class="btn-primary notfound-button">Back to Khaya Kos</a>
    </div>
  </main>

</body>

</html>
