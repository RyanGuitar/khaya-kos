<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Page Not Found | Khaya Kos</title>
  <meta name="robots" content="noindex">

  <link rel="icon" type="image/svg+xml" href="/images/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Kalam:wght@700&family=Nunito:wght@400;600;700;800&display=swap">
  <link rel="stylesheet" href="styles.css?v=2.0">

  <style>
    .notfound-hero {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .notfound-sign {
      background: var(--paper);
      border-radius: var(--radius);
      padding: 48px 36px;
      box-shadow: var(--shadow-lg);
      border: 3px solid var(--brown-deep);
      text-align: center;
      max-width: 480px;
    }

    .notfound-code {
      font-family: 'Baloo 2', sans-serif;
      font-weight: 800;
      font-size: 5rem;
      color: var(--red-deep);
      line-height: 1;
      text-shadow: 2px 2px 0 rgba(217, 154, 43, 0.35);
    }

    .notfound-title {
      font-family: 'Baloo 2', sans-serif;
      font-weight: 700;
      font-size: 1.6rem;
      color: var(--ink);
      margin: 12px 0 10px;
    }

    .notfound-text {
      font-family: 'Nunito', sans-serif;
      color: var(--ink-soft);
      line-height: 1.6;
      margin-bottom: 26px;
    }
  </style>
</head>

<body style="background: var(--kraft);">

  <div class="notfound-hero">
    <div class="notfound-sign">
      <div class="notfound-code">404</div>
      <h1 class="notfound-title">This stall isn't here on a Saturday</h1>
      <p class="notfound-text">
        The page you're looking for doesn't exist — but the muffins do.
        Head back to find the full Khaya Kos menu.
      </p>
      <a href="/" class="btn-primary" style="justify-content:center;">🏠 Back to Khaya Kos</a>
    </div>
  </div>

</body>

</html>
